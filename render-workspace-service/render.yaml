services:
  - type: web
    name: sustainable-catalyst-library-workspaces
    runtime: python
    plan: free
    rootDir: render-workspace-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: DATABASE_URL
        fromDatabase:
          name: sustainable-catalyst-library-postgres
          property: connectionString
      - key: SC_LIBRARY_SYNC_API_KEY
        generateValue: true
      - key: SC_LIBRARY_MAX_WORKSPACE_MB
        value: 8
      - key: SC_LIBRARY_MAX_DOCUMENT_REQUEST_MB
        value: 8
      - key: SC_LIBRARY_MAX_PDF_MB
        value: 20
      - key: SC_LIBRARY_DOCUMENT_MAX_ATTEMPTS
        value: 3
      - key: SC_LIBRARY_ALLOW_REMOTE_IMAGES
        value: true
      - key: SC_LIBRARY_ALLOW_REMOTE_MEDIA
        value: true
      - key: SC_LIBRARY_MEDIA_MAX_SOURCE_MB
        value: 500
      - key: SC_LIBRARY_MEDIA_MAX_OUTPUT_MB
        value: 500
      - key: SC_LIBRARY_MEDIA_MAX_CLIP_MINUTES
        value: 30
      - key: SC_LIBRARY_MEDIA_MAX_ATTEMPTS
        value: 3

databases:
  - name: sustainable-catalyst-library-postgres
    plan: free
    databaseName: sustainable_catalyst_library
    user: sustainable_catalyst_library
